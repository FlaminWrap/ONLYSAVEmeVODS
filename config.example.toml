# Add simple source URLs or platform shorthands here. The dashboard Config tab
# can edit this top-level list after the first run, but streamer groups are
# recommended for shared settings.
# Examples:
# channels = [
#   "@SomeChannel",
#   "https://www.youtube.com/@SomeChannel",
#   "twitch:SomeChannel",
#   "kick:SomeChannel",
#   "rumble:user/SomeChannel",
# ]
channels = []

# For one streamer with several sources, use a streamer object instead. The
# daemon monitors every source, stores downloads under the streamer name, and
# shares voice detection and speaker-name settings across those sources.
# [streamers."Some Streamer"]
# sources = [
#   "@SomeStreamer",
#   "https://www.youtube.com/@SomeStreamerVODS",
#   "twitch:SomeStreamer",
#   "kick:SomeStreamer",
#   "https://rumble.com/user/SomeStreamer",
# ]
# download_dir_name = "Some Streamer"
# powerchat_enabled = true
# powerchat_username = "SomeStreamer"
# timezone = "Europe/London"
#
# Optional post-stream overrides. Omit a key to inherit its top-level app
# default. The dashboard manages these from Streamers > Manage > After a stream.
# [streamers."Some Streamer".post_stream]
# twitch_ad_repair_enabled = false
# transcribe_subtitles = true
# voice_match_enabled = true
# stream_event_detection_enabled = true
# render_live_chat_video = false
#
# [streamers."Some Streamer".voice_detection]
# mode = "fixed"
# speakers = 2
#
# [streamers."Some Streamer".speaker_labels]
# SPEAKER_00 = "Host"
# SPEAKER_01 = "Guest"
#
# Known voices can be shared across every source in the streamer group. Use the
# dashboard Voices button to upload samples or make samples from diarized
# transcript segments; managed files live under state/voice_samples/.
# [streamers."Some Streamer".voices."Host"]
# enabled = true
# samples = ["intro-clip.wav", "host-from-transcript.voice-sample.json"]
# threshold = 0.35
# notes = "Main streamer voice"

download_dir = "downloads"
state_dir = "state"

poll_interval_seconds = 60
max_concurrent_downloads = 4
channel_scan_limit = 10
discovery_probe_concurrency = 4
live_from_start = true

# Record YouTube live chat as a sidecar .live_chat.json file when available.
# Non-YouTube sources are video-first for now; chat capture/rendering is
# currently YouTube-only.
record_live_chat = false

# After a stream ends, create a separate MP4 with the original video on the left
# and rendered live chat on the right. Kick renders use 60 fps; other platforms
# use 30 fps to reduce render time. This implies record_live_chat.
render_live_chat_video = false

# Worker processes for chat panel frame rendering. 0 uses all CPU cores,
# 1 forces serial rendering, and higher values use that exact worker count.
chat_render_panel_workers = 0

# Maximum seconds allowed for the final FFmpeg chat render step. Long full-stream
# renders can need more than the default; set 0 to disable the timeout.
chat_render_timeout_seconds = 3600

# Use NVIDIA NVENC for the FFmpeg chat video encode/merge stages. This speeds
# encoding when FFmpeg was built with NVENC support and an NVIDIA driver is
# available. Leave the device list empty for FFmpeg's default GPU, set
# chat_render_nvenc_devices = ["0"] for one GPU, or set ["0", "1"] to rotate
# concurrent/segment renders across multiple GPUs. The systemd installer can
# install NVIDIA/NVENC packages on supported DNF systems when NVIDIA PCI
# hardware is detected; the running app only detects and logs what is available.
chat_render_use_nvenc = false
chat_render_nvenc_devices = []

# Twitch sometimes records a local "Commercial break in progress" slate instead of
# the streamer's video. When enabled, finalized Twitch videos are OCR-scanned for
# that slate, the matching moment is pulled from the channel's recent Twitch VOD,
# and a separate .repaired.mp4 copy is written beside the original. This needs
# tesseract in PATH and a Twitch VOD covering the captured time.
twitch_ad_repair_enabled = true
twitch_ad_repair_tesseract_path = "tesseract"
twitch_ad_repair_scan_seconds = 300
twitch_ad_repair_sample_seconds = 2
twitch_ad_repair_max_seconds = 180
twitch_ad_repair_vod_search_limit = 5

# Automatically create speech subtitles after a stream is finalized. WhisperX
# writes .srt, .vtt, .txt, .tsv, and .json sidecars next to the media file.
transcribe_subtitles = false

# Keep this at 1 for a single GPU. Increase only if the machine can run multiple
# WhisperX jobs without exhausting VRAM.
transcription_max_concurrent = 1

# WhisperX settings. Voice detection uses WhisperX/pyannote diarization to
# label speakers as SPEAKER_00, SPEAKER_01, etc. Manage these settings with:
#   onlysavemevods voice-detection show --config config.toml
#   onlysavemevods voice-detection set --config config.toml --mode auto
# Modes: off disables labels, auto lets WhisperX infer the count, range uses
# whisperx_min_speakers/whisperx_max_speakers, and fixed sets both to one count.
# The dashboard Config tab can manage the default, streamer, and per-source overrides.
# To use diarization with pyannote, set the environment variable named by
# whisperx_hf_token_env and accept the required Hugging Face model terms.
whisperx_path = "whisperx"
whisperx_model = "large-v3"
whisperx_device = "cuda"
whisperx_compute_type = "float16"
whisperx_batch_size = 16
whisperx_language = ""
whisperx_diarize = true
whisperx_hf_token_env = "HF_TOKEN"
whisperx_min_speakers = 0
whisperx_max_speakers = 0

# Optional sample-backed voice matching after WhisperX diarization. This needs
# the optional pyannote.audio dependency and the Hugging Face token/model access
# required by voice_match_model. Strong matches are written to
# <media>.voice-attribution.json and applied to subtitles unless a manual
# speaker label already exists.
voice_match_enabled = true
voice_match_model = "pyannote/embedding"
voice_match_threshold = 0.35
voice_match_min_margin = 0.05
voice_sample_max_bytes = 104857600

# Optional post-finalize content event detection. This uses an optional
# Hugging Face AudioSet classifier plus transcript keywords to find notable
# moments after final media is ready. The installer installs the optional
# stream-events dependency when stream_event_detection_enabled = true.
stream_event_detection_enabled = false
stream_event_model = "MIT/ast-finetuned-audioset-10-10-0.4593"
stream_event_device = "auto"
stream_event_window_seconds = 10.0
stream_event_hop_seconds = 5.0
stream_event_min_confidence = 0.35
stream_event_max_events_per_media = 100

# [[stream_event_rules]]
# name = "Hype reaction"
# labels = ["Laughter", "Cheering", "Applause"]
# keywords = ["let's go", "no way"]
# min_loudness_dbfs = -28.0
# min_duration_seconds = 2.0
# max_duration_seconds = 45.0
# severity = "info"

# Optional source-specific override. Use the source/channel name shown in the dashboard.
# If a streamer also has voice_detection settings, this source-specific table wins.
# [channel_voice_detection."Example Channel"]
# mode = "fixed"
# speakers = 2

# Optional speaker-name mapping for diarized subtitles. WhisperX emits labels
# such as SPEAKER_00 and SPEAKER_01 in each transcript JSON. The dashboard
# Config tab can show detected labels and save mappings per streamer or source.
# [channel_speaker_labels."Example Channel"]
# SPEAKER_00 = "Host"
# SPEAKER_01 = "Guest"

# Use "DEBUG" while diagnosing stream detection, resume, and finalize behavior.
# Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level = "INFO"

# Local dashboard. It can edit config.toml, queue dashboard jobs, and download
# finalized files. Use SSH port forwarding or a reverse proxy if you need remote
# access; there is no built-in authentication yet.
web_enabled = true
web_host = "127.0.0.1"
web_port = 8080

# GitHub Release updater. Modes:
# disabled: no checks or install controls.
# manual: check/install only when requested from the About tab.
# check_only: scheduled/manual checks show available updates but never install.
# auto_install: scheduled checks request newer release installs when idle.
app_update_mode = "manual"
app_update_repository = "FlaminWrap/ONLYSAVEmeVODS"
app_update_include_prereleases = false
app_update_github_token_env = "GITHUB_TOKEN"

# Keep downloaded media fragments while a segment is active. This costs extra
# disk space, but it lets the bot turn an accidentally finalized audio/video
# format back into a resumable .part file without dropping fragments.
keep_fragments_for_resume = true

# Planned reconnects are disabled by default. The mixed-format watchdog still
# reconnects when one format finalizes while another remains partial. Set this
# above 0 only if you also want periodic forced reconnects after catch-up.
reconnect_interval_seconds = 0

# After yt-dlp exits, re-check the video at these offsets in seconds.
# If any check says the stream is still live, the downloader restarts.
# If all checks complete without seeing live, the stream is marked ended.
post_exit_check_seconds = [
  30, 60, 90, 120, 150, 180, 210, 240, 270, 300,
  330, 360, 390, 420, 450, 480, 510, 540, 570, 600,
]

retry_backoff_seconds = [30, 60, 120, 300]

# Extra args are passed before the bot's core yt-dlp download args. Do not use
# metadata-only or download-suppression flags here, such as --skip-download.
# The dashboard can replace or clear these args without displaying existing
# sensitive values such as cookie paths or authorization headers.
# Example:
# extra_yt_dlp_args = ["--format", "bestvideo+bestaudio/best"]
extra_yt_dlp_args = []

# FFmpeg is used to finalize leftover .part format files after a stream ends.
ffmpeg_path = "ffmpeg"

# Generate private, per-recipient invisible watermark copies from finalized
# videos. Originals are not modified. Set the environment variable named by
# watermark_secret_env before queueing or detecting watermark copies. Generate
# a long random secret with:
#
#   export ONLYSAVEMEVODS_WATERMARK_SECRET="$(openssl rand -base64 48)"
#
# The systemd installer creates /opt/onlysavemevods/secrets.env with a generated value
# if it does not already exist, and the service loads that file. Back it up with
# config.toml and state/onlysavemevods.sqlite3; old watermarks cannot be detected
# if the secret is lost. Do not paste the secret itself into this config file.
watermark_enabled = false
watermark_secret_env = "ONLYSAVEMEVODS_WATERMARK_SECRET"

# Strength presets: invisible, balanced, robust. The default prioritizes normal
# viewing quality while still targeting ordinary re-encodes and light edits.
watermark_strength = "invisible"

# Maximum suspect video upload size accepted by the local dashboard detector.
watermark_detect_upload_max_bytes = 2147483648
